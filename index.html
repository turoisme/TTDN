<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>

<link rel="stylesheet" href="./css/style.css">
</head>

<body>
<!-- HEADER -->
<header>
<div class="container">
    <!-- Top Header -->
    <div class="top-header">
        <div class="header-logo">
            <img src="assets/images/logo.svg" alt="Logo" class="logo-image">
        </div>
    <div class="hashtag-icons"></div>
    </div>

    </div>

    <!-- Hot Topics -->
    <div class="hot-topics">
        <div class ="container">
        <div class="home-icon">
            <img src="assets/icons/home_icon.svg" alt="Home Icon">
        </div>
    <div class="hot-topic"></div>
        <div class="search-icon">
            <img src="assets/icons/search_icon.svg" alt="Search Icon">
        </div>
        <div class="menu-icon" id="menu-toggle">
    <img
        id="menu-icon-img"
        src="assets/icons/menu_icon.svg"
        alt="Menu Icon">
         </div>
    </div>

    <!-- Main Menu -->
    <nav id="main-menu">

    </nav>
    <div id="mega-menu"></div>
</div>
</header>

<!-- MAIN -->
<main>
<div class="container">
    <!-- Hero News -->
    <section class="top-news">

        <div id="left-news"></div>

        <div id="featured-news"></div>

        <div id="right-news">

        </div>

    </section>

    <!-- Content Area -->
    <section class="content-section">

        <!-- Article List -->
        <div id="article-list">
        </div>

        <!-- Sidebar Banner -->
        <aside id="sidebar">

        </aside>

    </section>

    <!-- Mobile Featured Cards (rightNews + featuredNews dạng card lớn, chỉ hiện mobile) -->
    <div id="mobile-featured-cards"></div>

    <!-- Load More -->
    <div class="load-more-container">

        <button id="load-more">
            Xem thêm
            <img src="assets/icons/arrow_down_icon.svg" alt="Arrow Down Icon">
        </button>
    </div>
</div>
</main>

<!-- FOOTER -->
<footer>
    <div class="hot-topics">
        <div class="container">
            <div class="home-icon">
                <img src="assets/icons/home_icon.svg" alt="Home Icon">
            </div>
            <div class="hot-topic" id="footer-menu"></div>
            <div class="search-icon">
                <img src="assets/icons/search_icon.svg" alt="Search Icon">
            </div>
        </div>
    </div>

    <div id="bottom-footer">
        <div class="container">
            <div class="footer-logo">
                <img src="assets/images/footer_logo.svg" alt="Logo" class="logo-image">
            </div>

            <div class="footer-contacts" id="footer-contacts"></div>

            <div class="footer-info" id="footer-info"></div>
        </div>
    </div>
</footer>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-bottom-nav">
    <div class="mobile-nav-item active">
        <img src="assets/icons/home_icon.svg" alt="Trang chủ">
        <span>Trang chủ</span>
    </div>
    <div class="mobile-nav-item">
        <img src="assets/icons/new_icon.svg" alt="Tin mới">
        <span>Tin mới</span>
    </div>
    <div class="mobile-nav-item">
        <img src="assets/icons/video_icon.svg" alt="Video">
        <span>Video</span>
    </div>
    <div class="mobile-nav-item">
        <img src="assets/icons/menu_icon.svg" alt="Chuyên mục">
        <span>Chuyên mục</span>
    </div>
</nav>

<script src="./js/main.js"></script>

</body>

</html>
